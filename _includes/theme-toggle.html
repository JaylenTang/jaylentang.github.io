<button class="theme-toggle{% if include.class %} {{ include.class }}{% endif %}" type="button" data-theme-toggle aria-label="Switch to dark mode" title="Switch to dark mode">
  <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true"><i class="fas fa-moon"></i></span>
  <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true"><i class="fas fa-sun"></i></span>
  <span class="visually-hidden">Toggle color theme</span>
</button>
